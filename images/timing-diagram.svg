<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <rect width="700" height="300" fill="#262626"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FDE6A0">Hardware Timestamping with PPS</text>

  <!-- Time axis -->
  <line x1="60" y1="210" x2="650" y2="210" stroke="#FDE6A0" stroke-width="1"/>
  <text x="660" y="214" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">time</text>

  <!-- Free-running counter (diagonal gold line going up) -->
  <line x1="80" y1="190" x2="630" y2="50" stroke="#FBEB24" stroke-width="2"/>
  <text x="400" y="90" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FBEB24" transform="rotate(-22, 400, 90)">Free-running counter (100 MHz)</text>

  <!-- PPS1 vertical dashed line -->
  <line x1="150" y1="35" x2="150" y2="210" stroke="#A3E835" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="150" y="230" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A3E835">PPS&#8321;</text>

  <!-- PPS2 vertical dashed line -->
  <line x1="560" y1="35" x2="560" y2="210" stroke="#A3E835" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="560" y="230" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A3E835">PPS&#8322;</text>

  <!-- 1 second bracket -->
  <line x1="150" y1="245" x2="560" y2="245" stroke="#FDE6A0" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="240" x2="150" y2="250" stroke="#FDE6A0" stroke-width="1" opacity="0.5"/>
  <line x1="560" y1="240" x2="560" y2="250" stroke="#FDE6A0" stroke-width="1" opacity="0.5"/>
  <text x="355" y="258" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">1 second</text>

  <!-- Counter value at PPS1 -->
  <!-- Intersection of counter line with PPS1: approx y=172 -->
  <circle cx="150" cy="172" r="4" fill="#A3E835"/>
  <line x1="150" y1="172" x2="80" y2="172" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <rect x="15" y="160" width="130" height="24" rx="4" fill="#404040" stroke="#FDE6A0" stroke-width="1"/>
  <text x="80" y="176" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">pps_count = 100,000,000</text>

  <!-- Message arrival triangle (between PPS1 and PPS2, ~40% through) -->
  <polygon points="310,200 303,210 317,210" fill="#FBEB24" stroke="#FBEB24" stroke-width="1"/>

  <!-- Intersection point on counter line -->
  <circle cx="310" cy="131" r="4" fill="#FBEB24"/>
  <line x1="310" y1="131" x2="310" y2="200" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- TOA box -->
  <rect x="320" y="119" width="140" height="24" rx="4" fill="#404040" stroke="#FBEB24" stroke-width="1"/>
  <text x="390" y="135" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FBEB24">TOA = 140,000,000</text>

  <!-- Message label -->
  <text x="310" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FBEB24">message</text>

  <!-- Calculation annotation -->
  <rect x="130" y="270" width="440" height="22" rx="4" fill="#404040" opacity="0.5"/>
  <text x="350" y="286" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FDE6A0">TOA &#8722; pps_count = 40,000,000 &#8594; 400 ms into this second</text>
</svg>