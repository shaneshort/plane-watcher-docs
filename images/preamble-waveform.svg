<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#262626"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FDE6A0">Mode-S Preamble (8 &#181;s)</text>

  <!-- Time axis -->
  <line x1="60" y1="230" x2="760" y2="230" stroke="#FDE6A0" stroke-width="1"/>
  <!-- Tick marks every 1 us (8us total, 87.5px per us) -->
  <line x1="60" y1="230" x2="60" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="60" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">0</text>
  <line x1="147" y1="230" x2="147" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="147" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">1</text>
  <line x1="235" y1="230" x2="235" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="235" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">2</text>
  <line x1="322" y1="230" x2="322" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="322" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">3</text>
  <line x1="410" y1="230" x2="410" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="410" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">4</text>
  <line x1="497" y1="230" x2="497" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="497" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">5</text>
  <line x1="585" y1="230" x2="585" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="585" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">6</text>
  <line x1="672" y1="230" x2="672" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="672" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">7</text>
  <line x1="760" y1="230" x2="760" y2="237" stroke="#FDE6A0" stroke-width="1"/>
  <text x="760" y="252" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">8 &#181;s</text>

  <!-- Quiet zones (translucent gold, 6% opacity) -->
  <!-- QA: 1.5-2.0 us = x191 to x235 -->
  <rect x="191" y="50" width="44" height="180" fill="#FBEB24" opacity="0.06"/>
  <text x="213" y="47" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.7">QA</text>

  <!-- QB: 2.0-3.5 us = x235 to x366 -->
  <rect x="235" y="50" width="131" height="180" fill="#FBEB24" opacity="0.06"/>
  <text x="300" y="47" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.7">QB</text>

  <!-- QC: 4.0-4.5 us = x410 to x453 -->
  <rect x="410" y="50" width="43" height="180" fill="#FBEB24" opacity="0.06"/>
  <text x="431" y="47" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.7">QC</text>

  <!-- QD: 5.0-5.5 us = x497 to x541 -->
  <rect x="497" y="50" width="44" height="180" fill="#FBEB24" opacity="0.06"/>
  <text x="519" y="47" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.7">QD</text>

  <!-- Threshold line (dashed lime) -->
  <line x1="60" y1="180" x2="760" y2="180" stroke="#A3E835" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="770" y="184" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#A3E835">thr</text>

  <!-- P1: 0.0 us, bell pulse centered at x60, width ~44px (0.5us) -->
  <path d="M 48,225 C 52,220 56,130 62,80 C 66,60 72,60 78,80 C 84,130 88,220 92,225" fill="none" stroke="#FBEB24" stroke-width="2.5"/>
  <text x="70" y="55" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FBEB24">P1</text>

  <!-- P2: 1.0 us, centered at x147 -->
  <path d="M 135,225 C 139,220 143,130 149,80 C 153,60 159,60 165,80 C 171,130 175,220 179,225" fill="none" stroke="#FBEB24" stroke-width="2.5"/>
  <text x="157" y="55" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FBEB24">P2</text>

  <!-- P3: 3.5 us, centered at x366 -->
  <path d="M 354,225 C 358,220 362,130 368,80 C 372,60 378,60 384,80 C 390,130 394,220 398,225" fill="none" stroke="#FBEB24" stroke-width="2.5"/>
  <text x="376" y="55" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FBEB24">P3</text>

  <!-- P4: 4.5 us, centered at x453 -->
  <path d="M 441,225 C 445,220 449,130 455,80 C 459,60 465,60 471,80 C 477,130 481,220 485,225" fill="none" stroke="#FBEB24" stroke-width="2.5"/>
  <text x="463" y="55" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FBEB24">P4</text>

  <!-- Baseline noise between pulses (subtle) -->
  <path d="M 92,225 L 100,222 L 110,224 L 120,223 L 135,225" fill="none" stroke="#FBEB24" stroke-width="1" opacity="0.3"/>
  <path d="M 179,225 L 190,222 L 210,224 L 230,223 L 250,224 L 270,222 L 290,225 L 310,223 L 330,224 L 354,225" fill="none" stroke="#FBEB24" stroke-width="1" opacity="0.3"/>
  <path d="M 398,225 L 410,222 L 420,224 L 430,223 L 441,225" fill="none" stroke="#FBEB24" stroke-width="1" opacity="0.3"/>
  <path d="M 485,225 L 500,222 L 520,224 L 540,223 L 545,225" fill="none" stroke="#FBEB24" stroke-width="1" opacity="0.3"/>

  <!-- Data bits annotation -->
  <line x1="545" y1="205" x2="545" y2="225" stroke="#A3E835" stroke-width="1.5"/>
  <text x="600" y="210" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#A3E835">&#8592; data bits begin here</text>

  <!-- Y-axis label -->
  <text x="38" y="145" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" transform="rotate(-90, 38, 145)">Power</text>

  <!-- Bottom annotation -->
  <text x="400" y="285" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic" fill="#FDE6A0" opacity="0.7">Quiet zones must show low power to distinguish preamble from noise or data</text>
</svg>