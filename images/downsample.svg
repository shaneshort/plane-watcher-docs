<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="#262626"/>

  <!-- Top row: Input 30.72 MHz -->
  <text x="20" y="35" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#FBEB24">Input: 30.72 MHz</text>

  <!-- Time axis top -->
  <line x1="50" y1="65" x2="560" y2="65" stroke="#404040" stroke-width="1"/>

  <!-- Dense gold dots (20 dots) -->
  <circle cx="65" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="90" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="115" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="140" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="165" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="190" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="215" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="240" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="265" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="290" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="315" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="340" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="365" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="390" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="415" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="440" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="465" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="490" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="515" cy="55" r="4" fill="#FBEB24"/>
  <circle cx="540" cy="55" r="4" fill="#FBEB24"/>

  <!-- Bottom row: Output 16 MHz -->
  <text x="20" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="bold" fill="#A3E835">Output: 16 MHz</text>

  <!-- Time axis bottom -->
  <line x1="50" y1="140" x2="560" y2="140" stroke="#404040" stroke-width="1"/>

  <!-- Fewer lime dots (~10, non-uniformly spaced from input to show fractional pick) -->
  <circle cx="65" cy="130" r="5" fill="#A3E835"/>
  <circle cx="115" cy="130" r="5" fill="#A3E835"/>
  <circle cx="165" cy="130" r="5" fill="#A3E835"/>
  <circle cx="215" cy="130" r="5" fill="#A3E835"/>
  <circle cx="265" cy="130" r="5" fill="#A3E835"/>
  <circle cx="315" cy="130" r="5" fill="#A3E835"/>
  <circle cx="365" cy="130" r="5" fill="#A3E835"/>
  <circle cx="415" cy="130" r="5" fill="#A3E835"/>
  <circle cx="465" cy="130" r="5" fill="#A3E835"/>
  <circle cx="515" cy="130" r="5" fill="#A3E835"/>

  <!-- Dashed arrows from selected input dots to output dots -->
  <line x1="65" y1="60" x2="65" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="115" y1="60" x2="115" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="165" y1="60" x2="165" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="215" y1="60" x2="215" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="265" y1="60" x2="265" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="315" y1="60" x2="315" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="365" y1="60" x2="365" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="415" y1="60" x2="415" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="465" y1="60" x2="465" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="515" y1="60" x2="515" y2="124" stroke="#FDE6A0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Annotation -->
  <text x="300" y="178" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic" fill="#FDE6A0">Phase accumulator picks samples &#8212; not a simple integer divide (30.72 &#247; 16 = 1.92)</text>
</svg>