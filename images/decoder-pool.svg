<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="#262626"/>

  <!-- Title -->
  <text x="300" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#FDE6A0">Decoder Pool (8 Parallel Slots)</text>

  <!-- "New preamble" arrow pointing to slot 2 -->
  <text x="196" y="48" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A3E835">New preamble</text>
  <line x1="196" y1="52" x2="196" y2="68" stroke="#A3E835" stroke-width="1.5" marker-end="url(#arrowLimePool)"/>

  <!-- 8 decoder slots -->
  <!-- Slot 0: BUSY -->
  <rect x="30" y="72" width="60" height="50" rx="4" fill="#FBEB24" fill-opacity="0.3" stroke="#FBEB24" stroke-width="1.2"/>
  <text x="60" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0">0</text>
  <text x="60" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FBEB24">BUSY</text>

  <!-- Slot 1: BUSY -->
  <rect x="98" y="72" width="60" height="50" rx="4" fill="#FBEB24" fill-opacity="0.3" stroke="#FBEB24" stroke-width="1.2"/>
  <text x="128" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0">1</text>
  <text x="128" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FBEB24">BUSY</text>

  <!-- Slot 2: ASSIGN (lime highlight) -->
  <rect x="166" y="72" width="60" height="50" rx="4" fill="#A3E835" fill-opacity="0.15" stroke="#A3E835" stroke-width="2.5"/>
  <text x="196" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#A3E835">2</text>
  <text x="196" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A3E835">ASSIGN</text>

  <!-- Slot 3: BUSY -->
  <rect x="234" y="72" width="60" height="50" rx="4" fill="#FBEB24" fill-opacity="0.3" stroke="#FBEB24" stroke-width="1.2"/>
  <text x="264" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0">3</text>
  <text x="264" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FBEB24">BUSY</text>

  <!-- Slot 4: FREE -->
  <rect x="302" y="72" width="60" height="50" rx="4" fill="#404040" stroke="#525252" stroke-width="1"/>
  <text x="332" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.5">4</text>
  <text x="332" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" opacity="0.4">FREE</text>

  <!-- Slot 5: FREE -->
  <rect x="370" y="72" width="60" height="50" rx="4" fill="#404040" stroke="#525252" stroke-width="1"/>
  <text x="400" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.5">5</text>
  <text x="400" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" opacity="0.4">FREE</text>

  <!-- Slot 6: FREE -->
  <rect x="438" y="72" width="60" height="50" rx="4" fill="#404040" stroke="#525252" stroke-width="1"/>
  <text x="468" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.5">6</text>
  <text x="468" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" opacity="0.4">FREE</text>

  <!-- Slot 7: FREE -->
  <rect x="506" y="72" width="60" height="50" rx="4" fill="#404040" stroke="#525252" stroke-width="1"/>
  <text x="536" y="90" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FDE6A0" opacity="0.5">7</text>
  <text x="536" y="110" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" opacity="0.4">FREE</text>

  <!-- Bottom annotations -->
  <text x="300" y="150" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#FDE6A0">First-free scan: assign to lowest-numbered free slot</text>
  <text x="300" y="172" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0" opacity="0.6">All 8 busy &#8594; message dropped (rare in practice)</text>

  <!-- Legend -->
  <rect x="50" y="185" width="14" height="10" rx="2" fill="#FBEB24" fill-opacity="0.3" stroke="#FBEB24" stroke-width="0.8"/>
  <text x="70" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FDE6A0">Busy</text>
  <rect x="120" y="185" width="14" height="10" rx="2" fill="#A3E835" fill-opacity="0.15" stroke="#A3E835" stroke-width="0.8"/>
  <text x="140" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FDE6A0">Assigning</text>
  <rect x="200" y="185" width="14" height="10" rx="2" fill="#404040" stroke="#525252" stroke-width="0.8"/>
  <text x="220" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FDE6A0">Free</text>

  <defs>
    <marker id="arrowLimePool" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#A3E835"/>
    </marker>
  </defs>
</svg>