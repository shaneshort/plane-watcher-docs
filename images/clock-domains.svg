<svg xmlns="http://www.w3.org/2000/svg" width="700" height="250" viewBox="0 0 700 250">
  <rect width="700" height="250" fill="#262626"/>

  <!-- Lane labels column -->
  <!-- Lane 1: rx_clk -->
  <rect x="30" y="30" width="620" height="40" rx="4" fill="#525252" stroke="#FBEB24" stroke-width="1" opacity="0.8"/>
  <text x="45" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#FBEB24">rx_clk</text>
  <text x="45" y="63" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">61.44 MHz</text>
  <text x="360" y="55" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FDE6A0">AD9363 receive clock (raw IQ samples)</text>
  <!-- Clock ticks (dense) -->
  <g opacity="0.5">
    <line x1="500" y1="35" x2="500" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="510" y1="35" x2="510" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="520" y1="35" x2="520" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="530" y1="35" x2="530" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="540" y1="35" x2="540" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="550" y1="35" x2="550" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="560" y1="35" x2="560" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="570" y1="35" x2="570" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="580" y1="35" x2="580" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="590" y1="35" x2="590" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="600" y1="35" x2="600" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="610" y1="35" x2="610" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="620" y1="35" x2="620" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="630" y1="35" x2="630" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="640" y1="35" x2="640" y2="65" stroke="#FBEB24" stroke-width="0.8"/>
  </g>

  <!-- Lane 2: sample_clk (widest) -->
  <rect x="30" y="85" width="620" height="50" rx="4" fill="#525252" stroke="#FBEB24" stroke-width="1.5"/>
  <text x="45" y="107" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#FBEB24">sample_clk</text>
  <text x="45" y="123" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">16 MHz</text>
  <text x="360" y="113" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FDE6A0">Decode pipeline clock (edge detect, preamble, decoders)</text>
  <!-- Clock ticks (medium density) -->
  <g opacity="0.5">
    <line x1="500" y1="90" x2="500" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="520" y1="90" x2="520" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="540" y1="90" x2="540" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="560" y1="90" x2="560" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="580" y1="90" x2="580" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="600" y1="90" x2="600" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="620" y1="90" x2="620" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
    <line x1="640" y1="90" x2="640" y2="130" stroke="#FBEB24" stroke-width="0.8"/>
  </g>

  <!-- Lane 3: S_AXI_ACLK -->
  <rect x="30" y="150" width="620" height="44" rx="4" fill="#525252" stroke="#A3E835" stroke-width="1.5"/>
  <text x="45" y="170" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#A3E835">S_AXI_ACLK</text>
  <text x="45" y="186" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#FDE6A0">100 MHz</text>
  <text x="360" y="176" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#FDE6A0">Linux readout clock (AXI bus, timestamp counter)</text>
  <!-- Clock ticks (dense but lime) -->
  <g opacity="0.4">
    <line x1="500" y1="155" x2="500" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="508" y1="155" x2="508" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="516" y1="155" x2="516" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="524" y1="155" x2="524" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="532" y1="155" x2="532" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="540" y1="155" x2="540" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="548" y1="155" x2="548" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="556" y1="155" x2="556" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="564" y1="155" x2="564" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="572" y1="155" x2="572" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="580" y1="155" x2="580" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="588" y1="155" x2="588" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="596" y1="155" x2="596" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="604" y1="155" x2="604" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="612" y1="155" x2="612" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="620" y1="155" x2="620" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="628" y1="155" x2="628" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="636" y1="155" x2="636" y2="189" stroke="#A3E835" stroke-width="0.8"/>
    <line x1="644" y1="155" x2="644" y2="189" stroke="#A3E835" stroke-width="0.8"/>
  </g>

  <!-- Crossing arrows -->
  <!-- rx_clk → sample_clk -->
  <path d="M 185,70 C 185,77 155,78 155,85" fill="none" stroke="#FDE6A0" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrowMuted)"/>
  <text x="222" y="81" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FDE6A0">toggle CDC + downsample</text>

  <!-- sample_clk → S_AXI_ACLK -->
  <path d="M 185,135 C 185,142 155,143 155,150" fill="none" stroke="#FDE6A0" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrowMuted)"/>
  <text x="222" y="146" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#FDE6A0">async FIFO (Gray pointers)</text>

  <!-- Annotation -->
  <text x="350" y="222" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-style="italic" fill="#FDE6A0">Clock domains are like threads &#8212; data crossing between them needs synchronisation</text>

  <defs>
    <marker id="arrowMuted" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#FDE6A0"/>
    </marker>
  </defs>
</svg>